name: Deploy site to GitHub Pages

# Publica o site em GitHub Pages, MINIFICADO. O passo build:site gera site-dist/ a
# partir de site/ (index.html + css minificados; privacy/terms ficam legíveis) e é
# essa pasta que se publica. O configure-pages (enablement: true) LIGA o Pages sozinho
# na 1ª corrida. Cada push a main que altere site/ ou o script de build redeploya.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'tools/minify-site.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Uma só publicação de cada vez; não cancela um deploy a meio.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build minified site (site/ -> site-dist/)
        run: npm run build:site
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist
      - id: deployment
        uses: actions/deploy-pages@v4
